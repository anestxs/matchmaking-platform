services:
  postgres:
    image: postgres:17
    container_name: matchmaking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: matchmaking
      POSTGRES_PASSWORD: matchmaking
      POSTGRES_DB: matchmaking
    ports:
      - '5433:5432'
    volumes:
      - matchmaking-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U matchmaking']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  matchmaking-postgres-data:
